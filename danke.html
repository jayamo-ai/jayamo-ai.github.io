<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antrag eingegangen · JAYAMO AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--yellow:#fbe24a;--bg:#0a0a0a;--card:#111110;--fg:#f4f4f0;--fg2:#87877f;--border:rgba(244,244,240,0.12);}
body{font-family:"SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.box{max-width:480px;width:100%;text-align:center;}
.mark{width:64px;height:64px;border-radius:16px;background:var(--yellow);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:28px;}
h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px;}
p{font-size:15px;color:var(--fg2);line-height:1.65;margin-bottom:32px;}
.btn{display:inline-block;background:var(--yellow);color:#0a0a0a;font-size:15px;font-weight:700;padding:13px 28px;border-radius:100px;text-decoration:none;transition:opacity .15s;margin:4px;}
.btn:hover{opacity:.85;}
.btn.sec{background:transparent;color:var(--fg2);border:1px solid var(--border);}
.btn.sec:hover{color:var(--fg);}
</style>
</head>
<body>
<div class="box">
  <div class="mark">✓</div>
  <h1>Antrag eingegangen.</h1>
  <p>Sie erhalten in wenigen Minuten eine E-Mail mit Ihrem Zugangslink. In vier Wochen folgt Ihr persönlicher Effizienzbericht automatisch.</p>
  <a class="btn" href="demo-chat.html">Demo jetzt starten →</a>
  <a class="btn sec" href="index.html">Zurück zur Hauptseite</a>
</div>
</body>
</html>
