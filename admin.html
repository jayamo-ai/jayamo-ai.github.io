<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · JAYAMO AI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#ffffff;--card:#f0f4ff;--card2:#e8eeff;--border:rgba(26,36,86,0.10);--yellow:#ea580c;--fg:#1a2456;--fg2:#5566a0;--fg3:#8899bb;--green:#3ddc84;--red:#ff6b6b;--font:'DM Sans','Helvetica Neue',Arial,sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--fg);min-height:100vh;padding:32px 20px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:32px;}
.logo-mark{width:28px;height:28px;background:var(--yellow);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#06060a;}
.logo-text{font-size:15px;font-weight:700;color:var(--fg);}
.logo-text span{color:var(--yellow);}
.badge{font-size:10px;color:var(--fg3);background:var(--card2);border:1px solid var(--border);padding:3px 8px;border-radius:100px;margin-left:8px;}
h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.sub{font-size:14px;color:var(--fg2);margin-bottom:32px;line-height:1.55;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--yellow);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--fg3);margin-bottom:6px;}
.field input{width:100%;background:#ffffff;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--fg);outline:none;transition:border-color .15s;}
.field input:focus{border-color:rgba(234,88,12,.4);}
.field input::placeholder{color:var(--fg3);}
.btn{width:100%;background:var(--yellow);color:#06060a;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.status{margin-top:14px;padding:14px;border-radius:10px;font-size:13px;line-height:1.6;display:none;}
.status.success{background:rgba(61,220,132,.1);border:1px solid rgba(61,220,132,.3);color:var(--green);display:block;}
.status.error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:var(--red);display:block;}
.status.loading{background:rgba(234,88,12,.07);border:1px solid rgba(234,88,12,.2);color:var(--yellow);display:block;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.stat-box{background:var(--card2);border-radius:10px;padding:14px;text-align:center;}
.stat-n{font-size:28px;font-weight:800;color:var(--fg);}
.stat-l{font-size:11px;color:var(--fg3);margin-top:3px;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">J</div>
    <div class="logo-text">JAYAMO <span>AI</span></div>
    <span class="badge">Admin</span>
  </div>

  <h1>Report-Zentrale</h1>
  <p class="sub">28-Tage-Berichte manuell auslösen und an Kunden versenden.</p>

  <div class="card">
    <div class="card-title">Report generieren & senden</div>
    <div class="field">
      <label>Betriebsname (exakt wie im Bot-System)</label>
      <input type="text" id="r-betrieb" placeholder="Mustermann SHK GmbH">
    </div>
    <div class="field">
      <label>E-Mail des Kunden</label>
      <input type="email" id="r-email" placeholder="max@mustermann.de">
    </div>
    <div class="field">
      <label>Name des Inhabers (optional)</label>
      <input type="text" id="r-inhaber" placeholder="Max Mustermann">
    </div>
    <button class="btn" id="report-btn" onclick="sendReport()">📊 Report generieren & senden</button>
    <div class="status" id="report-status"></div>
    <div class="stat-grid" id="stat-grid" style="display:none;">
      <div class="stat-box"><div class="stat-n" id="s-anfragen">—</div><div class="stat-l">Anfragen gesamt</div></div>
      <div class="stat-box"><div class="stat-n" id="s-notfaelle">—</div><div class="stat-l">Notfälle erkannt</div></div>
      <div class="stat-box"><div class="stat-n" id="s-stunden">—</div><div class="stat-l">Stunden gespart</div></div>
      <div class="stat-box"><div class="stat-n" id="s-tage">—</div><div class="stat-l">Aktive Tage</div></div>
    </div>
  </div>

</div>

<script>
async function sendReport(){
  var betrieb=document.getElementById('r-betrieb').value.trim();
  var email=document.getElementById('r-email').value.trim();
  var inhaber=document.getElementById('r-inhaber').value.trim();
  var btn=document.getElementById('report-btn');
  var status=document.getElementById('report-status');
  var grid=document.getElementById('stat-grid');

  if(!betrieb||!email){setStatus('error','Bitte Betriebsname und E-Mail ausfüllen.');return;}

  btn.disabled=true;
  setStatus('loading','⏳ Report wird generiert — das dauert ca. 20 Sekunden...');
  grid.style.display='none';

  try {
    var resp=await fetch('https://anfragen-report.javichumartin1975.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({betrieb,email,inhaber})
    });
    var data=await resp.json();

    if(data.success){
      setStatus('success','✓ Report erfolgreich gesendet an '+email);
      if(data.stats){
        document.getElementById('s-anfragen').textContent=data.stats.totalAnfragen;
        document.getElementById('s-notfaelle').textContent=data.stats.notfaelle;
        document.getElementById('s-stunden').textContent=data.stats.gesparteStunden+'h';
        document.getElementById('s-tage').textContent=data.stats.aktiveTage;
        grid.style.display='grid';
      }
    } else {
      setStatus('error','⚠ '+(data.message||data.error||'Unbekannter Fehler'));
    }
  } catch(e){
    setStatus('error','⚠ Verbindungsfehler: '+e.message);
  }
  btn.disabled=false;
}

function setStatus(type,msg){
  var el=document.getElementById('report-status');
  el.className='status '+type;
  el.textContent=msg;
}
</script>
</body>
</html>
